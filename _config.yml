title: Boyang Blog
name: BiBoyang
description: >-
  iOS、Objective-C、Swift、Runtime、网络与 AI 相关的技术笔记。
url: "https://biboyang.github.io"
baseurl: ""
repository: "BiBoyang/BiBoyang.github.io"
locale: "zh-CN"

remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "air"

search: true
breadcrumbs: true
paginate: 8
paginate_path: /page:num/

author:
  name: "BiBoyang"
  bio: "iOS / Swift / Objective-C / React Native / Rust"
  location: "China"
  avatar: "https://avatars.githubusercontent.com/u/17757020?v=4"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/BiBoyang"

social:
  name: "BiBoyang"
  links:
    - "https://github.com/BiBoyang"

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache
  - jekyll-remote-theme

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      show_date: true
      related: true
      toc: true
      toc_sticky: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
